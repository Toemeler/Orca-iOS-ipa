name: iOS Step 3 - Full Orca GUI link-up

# Builds OrcaSlicer with SLIC3R_GUI=1 and SLIC3R_OPENGL_ES=1 against the
# step-1 dependency prefix and the step-2 wxWidgets iPhone-port install.
# First milestone: libslic3r_gui compiles. Second: the app links. Third:
# launch screenshot in the iPad simulator. Failures publish to ci-logs/.

on:
  workflow_dispatch:
    inputs:
      orca_ref:
        required: false
        default: "395e070a0e675fd4723f93967cefede730c482d9"
      wx_ref:
        required: false
        default: "v3.3.2"
      ios_min:
        required: false
        default: "17.0"

permissions:
  contents: write

jobs:
  gui:
    name: Orca GUI on iOS (simulator)
    runs-on: macos-15
    timeout-minutes: 300

    env:
      ORCA_REF: ${{ github.event.inputs.orca_ref || '395e070a0e675fd4723f93967cefede730c482d9' }}
      WX_REF: ${{ github.event.inputs.wx_ref || 'v3.3.2' }}
      IOS_MIN: ${{ github.event.inputs.ios_min || '17.0' }}
      PREFIX: ${{ github.workspace }}/ios-prefix
      WXPREFIX: ${{ github.workspace }}/wx-prefix
      SDK: iphonesimulator

    steps:
      - name: "[1/8] Checkout + tools"
        uses: actions/checkout@v4
      - run: |
          set -euxo pipefail
          brew install cmake ninja automake autoconf libtool nasm texinfo
          echo "$(brew --prefix texinfo)/bin" >> "$GITHUB_PATH"

      - name: Compute cache keys from patch/overlay hashes
        run: |
          set -euxo pipefail
          WXH=$({ find wx-overlay -type f | LC_ALL=C sort; cat $(find wx-overlay -type f | LC_ALL=C sort) patches/step2/*.patch; } | shasum | cut -c1-12)
          echo "WX_KEY=ios-wxprefix-v2-$WXH" >> "$GITHUB_ENV"
          echo "wx cache key: ios-wxprefix-$WXH"

      - name: "[2/8] Fetch Orca + apply step1+step3 patches"
        run: |
          set -euxo pipefail
          git clone https://github.com/SoftFever/OrcaSlicer.git orca
          cd orca && git checkout "$ORCA_REF"
          shopt -s nullglob
          for p in "$GITHUB_WORKSPACE"/patches/step1/*.patch "$GITHUB_WORKSPACE"/patches/step3/*.patch; do
            git apply --verbose "$p"
          done
          mkdir -p deps_src/hidapi/ios
          cp "$GITHUB_WORKSPACE"/ios/hid_ios_stub.c deps_src/hidapi/ios/hid.c

      - name: "[3/8] Restore deps cache (shared with step 1)"
        uses: actions/cache/restore@v4
        with:
          path: |
            orca/deps/build
            ios-prefix
            ~/dep-dl
          key: ios-deps-v1-step3-${{ github.run_number }}
          restore-keys: |
            ios-deps-v1-

      - name: "[4/8] Top up deps (cache resume)"
        run: |
          set -euxo pipefail
          cd orca/deps
          if [ -d build ]; then
            for d in build/dep_*-prefix; do
              [ -d "$d" ] || continue
              ls "$d"/src/*-stamp/*-install >/dev/null 2>&1 || rm -rf "$d"
            done
          fi
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=$SDK \
            -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_MIN \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 -DORCA_DEPS_GUI=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_JPEG=ON \
            -DDESTDIR="$PREFIX" -DDEP_DOWNLOAD_DIR="$HOME/dep-dl" > /dev/null
          WANT="dep_ZLIB dep_PNG dep_EXPAT dep_FREETYPE dep_Boost dep_TBB \
                dep_OpenSSL dep_CURL dep_Cereal dep_Eigen dep_NLopt dep_Qhull \
                dep_JPEG dep_GMP dep_MPFR dep_CGAL dep_Blosc dep_OpenEXR dep_OpenVDB \
                dep_Draco dep_libnoise dep_OCCT dep_OpenCV"
          ninja -t targets all > /tmp/t.txt
          B=""; for t in $WANT; do grep -q "^${t}:" /tmp/t.txt && B="$B $t" || true; done
          ninja $B

      - name: "[5/8] Build wxWidgets iPhone port"
        run: |
          set -euxo pipefail
          git clone --recurse-submodules https://github.com/SoftFever/Orca-deps-wxWidgets.git wx
          cd wx && git checkout "$WX_REF" && git submodule update --init --recursive
          shopt -s nullglob
          for p in "$GITHUB_WORKSPACE"/patches/step2/*.patch; do git apply --verbose "$p"; done
          cp -r "$GITHUB_WORKSPACE"/wx-overlay/include/. include/
          cp -r "$GITHUB_WORKSPACE"/wx-overlay/src/. src/
          mkdir -p build-ios && cd build-ios
          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=$SDK \
            -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_MIN \
            -DIPHONE=ON -DwxBUILD_TOOLKIT=osx_iphone \
            -DwxBUILD_SHARED=OFF -DwxBUILD_PRECOMP=OFF -DwxBUILD_SAMPLES=OFF \
            -DwxUSE_OPENGL=ON -DwxUSE_WEBVIEW=OFF -DwxUSE_XRC=OFF \
            -DwxUSE_MEDIACTRL=OFF -DwxUSE_SECRETSTORE=OFF \
            -DCMAKE_INSTALL_PREFIX="$WXPREFIX" > /dev/null
          ninja > /tmp/wx-ninja.log 2>&1 || (tail -50 /tmp/wx-ninja.log && exit 1)
          echo "MARK build-ok" | tee -a /tmp/wx-phase.log
          ninja install > /tmp/wx-install.log 2>&1 || { echo "MARK install-FAILED" | tee -a /tmp/wx-phase.log; tail -80 /tmp/wx-install.log; exit 1; }
          echo "MARK install-ok" | tee -a /tmp/wx-phase.log
          # overlay-after-install: ship non-installed iphone headers into the prefix
          WXINC=$(find "$WXPREFIX/include" -maxdepth 1 -name "wx-*" -type d | head -1)
          echo "MARK wxinc=[$WXINC]" | tee -a /tmp/wx-phase.log
          find "$WXPREFIX" -maxdepth 2 >> /tmp/wx-phase.log 2>&1 || true
          [ -n "$WXINC" ] || WXINC="$WXPREFIX/include"
          cp -r "$GITHUB_WORKSPACE"/wx-overlay/include/wx "$WXINC/" 2>/dev/null || true
          # ship generic-dataview private headers (ExtraRenderers.cpp includes them
          # under wxHAS_GENERIC_DATAVIEWCTRL) and the real webview public headers
          # (webview is built with no backend on iOS) - neither is installed by ninja
          mkdir -p "$WXINC/wx/generic/private"
          echo "MARK mkdir-ok" | tee -a /tmp/wx-phase.log
          cp -R "$GITHUB_WORKSPACE"/wx/include/wx/generic/private/. "$WXINC/wx/generic/private/"
          echo "MARK private-ship-ok" | tee -a /tmp/wx-phase.log
          cp "$GITHUB_WORKSPACE"/wx/include/wx/webview.h "$GITHUB_WORKSPACE"/wx/include/wx/webviewarchivehandler.h "$GITHUB_WORKSPACE"/wx/include/wx/webviewfshandler.h "$WXINC/wx/"
          mkdir -p "$WXINC/wx/osx"
          cp "$GITHUB_WORKSPACE"/wx/include/wx/osx/webviewhistoryitem_webkit.h "$WXINC/wx/osx/"
          echo "MARK webview-ship-ok" | tee -a /tmp/wx-phase.log
          ls -la "$WXINC/wx/webview.h" "$WXINC/wx/osx/webviewhistoryitem_webkit.h" "$WXINC/wx/generic/private/markuptext.h"
          echo "MARK ship-verified" | tee -a /tmp/wx-phase.log

      - name: Save wx prefix cache (for fast workflow)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: wx-prefix
          key: ${{ env.WX_KEY }}

      - name: Save deps prefix cache (for fast workflow)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ios-prefix
          key: ios-prefixonly-v1

      - name: Set up ccache
        run: |
          brew install ccache || true
          echo "CCACHE_DIR=$HOME/.ccache-step3" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=1" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=1.5G" >> "$GITHUB_ENV"
          # iOS cross-compiles embed the SDK path; slop keeps cache hits across
          # runner image updates that only move the SDK
          echo "CCACHE_SLOPPINESS=pch_defines,time_macros,include_file_mtime,include_file_ctime" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache-step3
          key: ccache-step3-${{ github.run_id }}
          restore-keys: |
            ccache-step3-

      - name: "[6/8] Configure Orca GUI build"
        run: |
          set -euxo pipefail
          cd orca && mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJC_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJCXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=$SDK \
            -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_MIN \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DSLIC3R_GUI=1 -DSLIC3R_OPENGL_ES=1 -DSLIC3R_STATIC=1 \
            -DCMAKE_PREFIX_PATH="$PREFIX/usr/local;$WXPREFIX" \
            -DCMAKE_FIND_ROOT_PATH="$PREFIX/usr/local;$WXPREFIX" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DJPEG_LIBRARY="$PREFIX/usr/local/lib/libjpeg.a" \
            -DJPEG_INCLUDE_DIR="$PREFIX/usr/local/include" \
            -DCMAKE_BUILD_TYPE=Release 2>&1 | tee /tmp/step3-configure.log

      - name: "[7/8] Build libslic3r_gui (milestone 1)"
        run: |
          set -euxo pipefail
          cd orca/build
          ninja -k 0 libslic3r_gui 2>&1 | tee /tmp/step3-ninja.log

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache-step3
          key: ccache-step3-${{ github.run_id }}

      - name: "[8/8] Save caches + upload logs artifact"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            orca/deps/build
            ios-prefix
            ~/dep-dl
          key: ios-deps-v1-step3-${{ github.run_number }}

      - name: "Publish failure logs to repo (ci-logs/)"
        if: failure()
        run: |
          set -ux
          D="ci-logs/step3-run-${GITHUB_RUN_NUMBER}"
          mkdir -p "$D"
          for f in /tmp/step3-configure.log; do
            [ -f "$f" ] && tail -c 40000 "$f" > "$D/$(basename "$f")"
          done
          for f in /tmp/wx-phase.log /tmp/wx-install.log; do
            [ -f "$f" ] && tail -c 20000 "$f" > "$D/$(basename "$f")"
          done
          for f in /tmp/step3-ninja.log /tmp/wx-ninja.log; do
            [ -f "$f" ] && grep -n -B3 -A35 -E "FAILED:|error:|Error [0-9]" "$f" | head -c 400000 > "$D/$(basename "$f" .log)-errors.log"
          done
          # -k0 summary: full map of remaining errors
          if [ -f /tmp/step3-ninja.log ]; then
            {
              echo "=== FAILED files ==="
              grep "FAILED:" /tmp/step3-ninja.log | sed -E "s#.*CMakeFiles/[^/]+\\.dir/##; s#\\.o.*##" | sort -u
              echo; echo "=== error signatures (deduped) ==="
              grep -oE "(unknown type name '[^']+'|use of undeclared identifier '[^']+'|unknown class name '[^']+'|no member named '[^']+'|no type named '[^']+'|no matching [a-z ]+ for call to '[^']+'|'[A-Za-z0-9_/.]+' file not found|marked 'override' but does not override|only virtual member functions can be marked 'override'|base class has incomplete type|cannot initialize [a-z ]+ (parameter|object))" /tmp/step3-ninja.log | sort | uniq -c | sort -rn
              echo; echo "total FAILED: $(grep -c FAILED: /tmp/step3-ninja.log)"
            } > "$D/SUMMARY.txt"
          fi
          git config user.name "ci-bot" && git config user.email "ci@users.noreply.github.com"
          git pull --rebase || true
          git add -A ci-logs || true
          git commit -m "step3 ci logs run ${GITHUB_RUN_NUMBER}" || true
          for i in 1 2 3; do git pull --rebase || true; git push && break; sleep 5; done
